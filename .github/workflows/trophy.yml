name: Generate trophy card

on:
  schedule:
    # Runs every 12 hours
    - cron: "0 */12 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: generate-svg
        # Using the official stable version to avoid 404 errors
        uses: ryo-ma/github-profile-trophy@master
        with:
          screen_name: ${{ github.repository_owner }}
          # We remove the 'file' argument as the stable version 
          # usually displays trophies directly in the README via URL